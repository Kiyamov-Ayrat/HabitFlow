version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: habitflow_postgres
    environment:
      POSTGRES_USER: habitflow
      POSTGRES_PASSWORD: habitflow_pass
      POSTGRES_DB: habitflow_db
    ports:
      - "5432:5432"          # порт снаружи : порт внутри контейнера
    volumes:
      - postgres_data:/var/lib/postgresql/data   # данные не теряются при перезапуске
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U habitflow -d habitflow_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: habitflow_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: habitflow_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"      # основной порт для подключения
      - "15672:15672"    # веб-интерфейс управления RabbitMQ
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data: